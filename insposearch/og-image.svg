<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0E0E0D"/>
      <stop offset="100%" style="stop-color:#1a1a18"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8B89A;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#a89070;stop-opacity:0.7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <rect width="1200" height="630" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.03"/>
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#C8B89A" stroke-width="0.4" opacity="0.15"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#C8B89A" stroke-width="0.4" opacity="0.15"/>

  <!-- Decorative circles (inspired by the search/discover visual) -->
  <circle cx="960" cy="180" r="220" fill="none" stroke="#C8B89A" stroke-width="0.6" opacity="0.12"/>
  <circle cx="960" cy="180" r="140" fill="none" stroke="#C8B89A" stroke-width="0.4" opacity="0.1"/>
  <circle cx="960" cy="180" r="60" fill="#C8B89A" opacity="0.06"/>

  <!-- Italic i logo mark -->
  <text x="960" y="205" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="120" fill="#C8B89A" text-anchor="middle" opacity="0.55">i</text>

  <!-- Main wordmark -->
  <text x="120" y="310" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="96" fill="#C8B89A" letter-spacing="-1">insposearch</text>

  <!-- Rule -->
  <rect x="120" y="338" width="560" height="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Tagline -->
  <text x="120" y="386" font-family="'DM Mono', 'Courier New', monospace" font-size="20" fill="#C8B89A" letter-spacing="3" opacity="0.7">MUSEUM · ARCHIVE · PHOTO</text>

  <!-- Source count -->
  <text x="120" y="450" font-family="'DM Mono', 'Courier New', monospace" font-size="15" fill="#7a7060" letter-spacing="2">500+ SOURCES  ·  3.2 BILLION IMAGES  ·  ZERO STORAGE</text>

  <!-- URL -->
  <text x="120" y="555" font-family="'DM Mono', 'Courier New', monospace" font-size="16" fill="#5a5048" letter-spacing="2">insposearch.pages.dev</text>
</svg>
