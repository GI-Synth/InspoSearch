name = "insposearch-api"
main = "worker.js"
compatibility_date = "2024-01-01"

[vars]
ALLOWED_ORIGIN = "https://insposearch.pages.dev"

# Workers AI — text embeddings, image captioning, query expansion
# Activate with: wrangler ai
[ai]
binding = "AI"

# KV Namespace — persistent board sharing (30-day TTL per board)
# Create with: wrangler kv namespace create BOARDS
# Then replace the placeholder id below with the real one.
[[kv_namespaces]]
binding = "BOARDS"
id = "cae86ef085bd4f6fb1cf9d44f7bc7079"

# D1 Database — community-contributed metadata (consent-gated)
# Created with: wrangler d1 create inspo-metadata
[[d1_databases]]
binding = "METADATA_DB"
database_name = "inspo-metadata"
database_id = "48837c1e-53d5-46ad-a548-e7f0f2b63c27"
