name: Nightly CORS-Blocked Source Fetch

on:
  schedule:
    - cron: '0 2 * * *'  # 2am UTC every night
  workflow_dispatch:      # Allow manual trigger from GitHub UI

permissions:
  contents: write         # Required to push data files back to the repo

jobs:
  fetch-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: Run nightly fetch
        run: node scripts/fetch-cors-blocked.js

      - name: Commit updated data files
        run: |
          git config --local user.email 'action@github.com'
          git config --local user.name 'InspoSearch Nightly Fetch'
          git add insposearch/data/
          git diff --staged --quiet || git commit -m 'chore: nightly fetch update'

      - name: Push changes (rebase on conflict, up to 5 attempts)
        run: |
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            echo "Push attempt $i failed, retrying after rebase..."
            sleep 5
          done
          echo "Push failed after 5 attempts" >&2
          exit 1
