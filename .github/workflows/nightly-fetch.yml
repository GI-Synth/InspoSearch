name: Nightly CORS-Blocked Source Fetch

on:
  schedule:
    - cron: '0 2 * * *'  # 2am UTC every night
  workflow_dispatch:      # Allow manual trigger from GitHub UI

permissions:
  contents: write         # Required to push data files back to the repo

jobs:
  fetch-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: Run nightly fetch
        run: node scripts/fetch-cors-blocked.js

      - name: Commit & push updated data files (race-safe)
        run: |
          git config --local user.email 'action@github.com'
          git config --local user.name 'InspoSearch Nightly Fetch'

          # Stash the fetched data files so we can re-apply atop latest main.
          # This is race-safe because nightly data files are purely additive/
          # replace-in-place — they never conflict with application code changes.
          mkdir -p /tmp/nightly-data
          cp -r insposearch/data/. /tmp/nightly-data/ 2>/dev/null || true

          for i in 1 2 3 4 5; do
            # Sync to latest main, discarding any local commit from a prior attempt.
            git fetch origin main
            git reset --hard origin/main

            # Re-apply the stashed data files atop fresh main.
            mkdir -p insposearch/data
            cp -r /tmp/nightly-data/. insposearch/data/

            git add insposearch/data/
            if git diff --staged --quiet; then
              echo "No changes to commit; exiting."
              exit 0
            fi
            git commit -m 'chore: nightly fetch update'

            if git push origin HEAD:main; then
              echo "Push succeeded on attempt $i."
              exit 0
            fi
            echo "Push attempt $i failed (main moved); retrying after resync..."
            sleep $((i * 5))
          done
          echo "Push failed after 5 attempts" >&2
          exit 1
