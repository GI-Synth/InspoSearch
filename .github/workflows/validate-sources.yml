name: Validate Source Manifests

on:
  pull_request:
    paths:
      - 'insposearch/sources/**.json'

jobs:
  validate:
    name: Schema validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate source manifests
        run: node scripts/validate-sources.js

      - name: Check for duplicate IDs
        run: |
          node --input-type=module <<'EOF'
          import { readdirSync, readFileSync } from 'fs';
          const dir = 'insposearch/sources';
          const ids = [];
          for (const f of readdirSync(dir).filter(f => f.endsWith('.json') && !f.startsWith('_'))) {
            const data = JSON.parse(readFileSync(dir + '/' + f, 'utf8'));
            if (ids.includes(data.id)) {
              console.error('Duplicate source ID: ' + data.id);
              process.exit(1);
            }
            ids.push(data.id);
          }
          console.log('No duplicate IDs found (' + ids.length + ' sources checked).');
          EOF
