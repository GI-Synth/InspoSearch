<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px; max-height: 400px;
      font-family: 'DM Mono', monospace;
      background: #0E0E0D; color: #E8E6E1;
      padding: 16px; font-size: 11px;
      letter-spacing: 0.04em;
    }
    h1 {
      font-family: serif; font-style: italic;
      font-size: 18px; font-weight: 300;
      color: #C8B89A; margin-bottom: 12px;
    }
    .count { color: #6B6960; margin-bottom: 12px; }
    .items {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 4px; max-height: 250px; overflow-y: auto;
    }
    .items img {
      width: 100%; aspect-ratio: 1; object-fit: cover;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .actions {
      display: flex; gap: 8px; margin-top: 12px;
    }
    .btn {
      flex: 1; padding: 6px; font-family: inherit;
      font-size: 9px; letter-spacing: 0.06em;
      background: none; border: 1px solid rgba(200,184,154,0.3);
      color: #C8B89A; cursor: pointer;
      text-align: center;
    }
    .btn:hover { background: #C8B89A; color: #0E0E0D; }
    .empty { color: #4A4A46; text-align: center; padding: 20px 0; }
  </style>
</head>
<body>
  <h1>insposearch</h1>
  <div class="count" id="count"></div>
  <div class="items" id="items"></div>
  <div class="actions">
    <a class="btn" href="https://insposearch.pages.dev" target="_blank">open insposearch</a>
    <button class="btn" id="btn-clear">clear board</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
